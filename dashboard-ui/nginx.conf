# WebSocket upgrade plumbing (used by /api/logs/stream).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy the API so the SPA stays same-origin (no CORS needed).
    # Covers REST routes and the /api/logs/stream WebSocket.
    location /api/ {
        proxy_pass http://dashboard-api:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
